<html>
    <head>
        <title>Adicionar Livro</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../styles.css">
    </head>

    <body>
        <button onclick="history.back()">Return to Previous Page</button>
        <form action="../LivroController?acao=2" method="POST">
            <div>
                <label for="titulo">Título:</label>
                <input type="text" id="titulo" name="titulo" maxlength="150" required>
            </div>
            
             <div>
                <label for="imagem">URL de Imagem:</label>
                <input type="text" id="imagem" name="imagem_url" maxlength="150" required>
            </div>

            <div>
                <label for="autor">Autor:</label>
                <input type="text" id="autor" name="autor" maxlength="100">
            </div>

            <div>
                <label for="data_publicacao">Data de Publicação:</label>
                <input type="date" id="data_publicacao" name="data_publicacao">
            </div>

            <div>
                <label for="editora">Editora:</label>
                <input type="text" id="editora" name="editora" maxlength="100">
            </div>

            <div>
                <label for="quantidade_total">Quantidade Total:</label>
                <input type="number" id="quantidade_total" name="quantidade_total" min="1" step="1" value="1" required>
            </div>

            <div>
                <button type="submit">Adicionar Livro</button>
            </div>
        </form>
    </body>
</html>
